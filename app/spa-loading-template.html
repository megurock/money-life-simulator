<style>
  :root {
    --bg: #f9fafb;
    --bg-card: #ffffff;
    --bg-skeleton: #e5e7eb;
    --bg-header: #ffffff;
    --border: #e5e7eb;
    --shimmer: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #030712;
      --bg-card: #111827;
      --bg-skeleton: #1f2937;
      --bg-header: #111827;
      --border: #1f2937;
      --shimmer: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .skeleton-header {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .skeleton-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--bg-skeleton);
  }

  .skeleton-title {
    width: 200px;
    height: 24px;
    border-radius: 6px;
    background: var(--bg-skeleton);
  }

  .skeleton-main {
    max-width: 1536px;
    margin: 0 auto;
    padding: 24px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 1024px) {
    .skeleton-main {
      grid-template-columns: 1fr;
    }
  }

  .skeleton-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .skeleton-card {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--border);
  }

  .skeleton-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .skeleton-card-icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    background: var(--bg-skeleton);
  }

  .skeleton-card-title {
    height: 18px;
    border-radius: 4px;
    background: var(--bg-skeleton);
  }

  .skeleton-row {
    display: grid;
    gap: 12px;
    margin-bottom: 12px;
  }

  .skeleton-row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .skeleton-row-2 { grid-template-columns: 1fr 1fr; }

  .skeleton-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .skeleton-label {
    height: 12px;
    width: 60px;
    border-radius: 3px;
    background: var(--bg-skeleton);
  }

  .skeleton-input {
    height: 36px;
    border-radius: 6px;
    background: var(--bg-skeleton);
  }

  .skeleton-chart {
    height: 300px;
    border-radius: 8px;
    background: var(--bg-skeleton);
  }

  .skeleton-table-row {
    height: 16px;
    border-radius: 3px;
    background: var(--bg-skeleton);
    margin-bottom: 10px;
  }

  /* shimmer animation */
  .shimmer {
    position: relative;
    overflow: hidden;
  }

  .shimmer::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--shimmer);
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
</style>

<!-- Header -->
<div class="skeleton-header">
  <div class="skeleton-icon shimmer"></div>
  <div class="skeleton-title shimmer"></div>
</div>

<!-- Main -->
<div class="skeleton-main">
  <!-- Left panel -->
  <div class="skeleton-panel">
    <!-- BasicInfo -->
    <div class="skeleton-card">
      <div class="skeleton-card-header">
        <div class="skeleton-card-icon shimmer"></div>
        <div class="skeleton-card-title shimmer" style="width: 80px;"></div>
      </div>
      <div class="skeleton-row skeleton-row-3">
        <div class="skeleton-field">
          <div class="skeleton-label shimmer"></div>
          <div class="skeleton-input shimmer"></div>
        </div>
        <div class="skeleton-field">
          <div class="skeleton-label shimmer"></div>
          <div class="skeleton-input shimmer"></div>
        </div>
        <div class="skeleton-field">
          <div class="skeleton-label shimmer"></div>
          <div class="skeleton-input shimmer"></div>
        </div>
      </div>
    </div>

    <!-- Account -->
    <div class="skeleton-card">
      <div class="skeleton-card-header">
        <div class="skeleton-card-icon shimmer"></div>
        <div class="skeleton-card-title shimmer" style="width: 100px;"></div>
      </div>
      <div class="skeleton-row skeleton-row-3">
        <div class="skeleton-field">
          <div class="skeleton-label shimmer"></div>
          <div class="skeleton-input shimmer"></div>
        </div>
        <div class="skeleton-field">
          <div class="skeleton-label shimmer"></div>
          <div class="skeleton-input shimmer"></div>
        </div>
        <div class="skeleton-field">
          <div class="skeleton-label shimmer"></div>
          <div class="skeleton-input shimmer"></div>
        </div>
      </div>
    </div>

    <!-- Income -->
    <div class="skeleton-card">
      <div class="skeleton-card-header">
        <div class="skeleton-card-icon shimmer"></div>
        <div class="skeleton-card-title shimmer" style="width: 60px;"></div>
      </div>
      <div class="skeleton-row skeleton-row-2">
        <div class="skeleton-field">
          <div class="skeleton-label shimmer"></div>
          <div class="skeleton-input shimmer"></div>
        </div>
        <div class="skeleton-field">
          <div class="skeleton-label shimmer"></div>
          <div class="skeleton-input shimmer"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="skeleton-panel">
    <!-- Alert -->
    <div class="skeleton-card">
      <div class="skeleton-table-row shimmer" style="width: 70%;"></div>
    </div>

    <!-- Chart -->
    <div class="skeleton-card">
      <div class="skeleton-card-header">
        <div class="skeleton-card-icon shimmer"></div>
        <div class="skeleton-card-title shimmer" style="width: 120px;"></div>
      </div>
      <div class="skeleton-chart shimmer"></div>
    </div>

    <!-- Table -->
    <div class="skeleton-card">
      <div class="skeleton-card-header">
        <div class="skeleton-card-icon shimmer"></div>
        <div class="skeleton-card-title shimmer" style="width: 140px;"></div>
      </div>
      <div class="skeleton-table-row shimmer"></div>
      <div class="skeleton-table-row shimmer" style="width: 90%;"></div>
      <div class="skeleton-table-row shimmer" style="width: 95%;"></div>
      <div class="skeleton-table-row shimmer" style="width: 85%;"></div>
      <div class="skeleton-table-row shimmer" style="width: 92%;"></div>
    </div>
  </div>
</div>
